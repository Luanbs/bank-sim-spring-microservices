name: banksim

services:
  redis:
    image: redis:8.0.2-alpine
    container_name: banksim-redis
    ports:
      - "6379:6379"
    networks:
      - banksim-net

  rabbitmq:
    image: rabbitmq:4.2.3-management
    container_name: banksim-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: banksim
      RABBITMQ_DEFAULT_PASS: banksim
    networks:
      - banksim-net

  postgres-auth:
    image: postgres:16
    container_name: banksim-postgres-auth
    environment:
      POSTGRES_DB: banksim_auth
      POSTGRES_USER: banksim
      POSTGRES_PASSWORD: banksim
    ports:
      - "5433:5432"
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    networks:
      - banksim-net

  postgres-account:
    image: postgres:16
    container_name: banksim-postgres-account
    environment:
      POSTGRES_DB: banksim_account
      POSTGRES_USER: banksim
      POSTGRES_PASSWORD: banksim
    ports:
      - "5434:5432"
    volumes:
      - pgdata-account:/var/lib/postgresql/data
    networks:
      - banksim-net

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: banksim-auth-service
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: banksim_auth
      DB_USER: banksim
      DB_PASSWORD: banksim
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: banksim
      RABBIT_PASSWORD: banksim
      JAVA_TOOL_OPTIONS: >
        --enable-native-access=ALL-UNNAMED
        --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED
        -Dio.netty.tryReflectionSetAccessible=true
    depends_on:
      - postgres-auth
      - rabbitmq
      - redis
    networks:
      - banksim-net
    volumes:
      - ./secrets/auth:/run/secrets/auth:ro

  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: banksim-account-service
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres-account
      DB_PORT: 5432
      DB_NAME: banksim_account
      DB_USER: banksim
      DB_PASSWORD: banksim
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: banksim
      RABBIT_PASSWORD: banksim
      INTERNAL_API_KEY: banksim-internal-key
      JAVA_TOOL_OPTIONS: >
        --enable-native-access=ALL-UNNAMED
        --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED
        -Dio.netty.tryReflectionSetAccessible=true
    depends_on:
      - postgres-account
      - rabbitmq
      - redis
    networks:
      - banksim-net

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: banksim-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: >
        --enable-native-access=ALL-UNNAMED
        --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED
        -Dio.netty.tryReflectionSetAccessible=true
    depends_on:
      - auth-service
      - account-service
      - redis
    networks:
      - banksim-net
      
  frontend:
    build:
      context: ./front-end-react
      dockerfile: docker/Dockerfile
      args:
        VITE_API: http://localhost:8080
    container_name: banksim-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - gateway
    profiles: ["frontend"]
    
networks:
  banksim-net:
    driver: bridge

volumes:
  pgdata-auth:
  pgdata-account:
