server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth
              uri: http://auth-service:8080
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

            - id: account
              uri: http://account-service:8080
              predicates:
                - Path=/account/**
              filters:
                - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      access: read-only