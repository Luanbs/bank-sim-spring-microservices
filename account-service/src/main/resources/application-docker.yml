server:
  port: 8080

spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banksim_account}
    username: ${DB_USER:banksim}
    password: ${DB_PASSWORD:banksim}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:banksim}
    password: ${RABBIT_PASSWORD:banksim}

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.orm.jpa: debug
    org.springframework.jdbc.datasource: debug
