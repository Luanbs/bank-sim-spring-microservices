server:
  port: 8082

spring:
  profiles:
    active: dev
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:banksim_account}
    username: ${DB_USER:banksim}
    password: ${DB_PASSWORD:banksim}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}


  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:banksim}
    password: ${RABBIT_PASSWORD:banksim}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.orm.jpa: debug
    org.springframework.jdbc.datasource: debug

internal:
  api-key: ${INTERNAL_API_KEY:banksim-internal-key}
